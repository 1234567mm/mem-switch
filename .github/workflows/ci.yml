name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ============================================
  # Backend Tests
  # ============================================
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run backend tests with coverage
        run: |
          cd backend
          python -m pytest tests/ -v \
            --cov=./services \
            --cov=./adapters \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=60

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml

  # ============================================
  # Frontend Build
  # ============================================
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  # ============================================
  # Rust Check (Tauri)
  # ============================================
  rust-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable

      - name: Check Rust code
        run: |
          cd src-tauri
          cargo check --all-targets

  # ============================================
  # Integration Test (API)
  # ============================================
  api-test:
    runs-on: ubuntu-latest
    needs: [backend-test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Start backend
        run: |
          cd backend
          timeout 10 uvicorn main:app --port 8765 &
          sleep 5

      - name: Test API endpoints
        run: |
          # Health check
          curl -s http://localhost:8765/api/health | grep -q "ok"

          # Settings API
          curl -s http://localhost:8765/api/settings | grep -q "ollama_host"

          echo "All API tests passed"
