name: Nightly Build

on:
  workflow_dispatch:
  schedule:
    # Run at 01:00 AM Beijing time (17:00 UTC)
    - cron: '0 17 * * *'

permissions:
  contents: write
  actions: write

env:
  DATE: ${{ steps.date.outputs.date }}

jobs:
  # ============================================
  # Date
  # ============================================
  date:
    runs-on: ubuntu-latest
    outputs:
      date: ${{ steps.date.outputs.date }}
    steps:
      - id: date
        run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

  # ============================================
  # Linux Nightly Build
  # ============================================
  build-linux:
    needs: date
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust@stable
        with:
          targets: x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libwebkit2gtk-4.0-37 libappindicator3-1 libevdev-dev libxtst-dev libx11-dev libxfixes-dev

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: linux-cargo-registry-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: linux-cargo-index-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: src-tauri/target
          key: linux-cargo-build-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            linux-cargo-build-

      - name: Build Linux x86_64
        run: |
          cd src-tauri
          cargo tauri build --target x86_64-unknown-linux-gnu --bundles appimage,deb
        env:
          CARGO_INCREMENTAL: 0

      - name: Build Linux ARM64
        run: |
          cd src-tauri
          cargo tauri build --target aarch64-unknown-linux-gnu --bundles appimage,deb
        env:
          CARGO_INCREMENTAL: 0

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mem-switch-nightly-${{ env.DATE }}-linux
          path: |
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/**/*.AppImage
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/**/*.deb
            src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/**/*.AppImage
            src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/**/*.deb
          retention-days: 3
          compression-level: 8

  # ============================================
  # Windows Nightly Build
  # ============================================
  build-windows:
    needs: date
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust@stable
        with:
          targets: x86_64-pc-windows-msvc,aarch64-pc-windows-msvc

      - name: Install cargo-xwin
        run: cargo install cargo-xwin

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: windows-cargo-registry-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: windows-cargo-index-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: src-tauri/target
          key: windows-cargo-build-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            windows-cargo-build-

      - name: Build Windows x86_64
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER: clang-cl
        run: |
          cd src-tauri
          cargo xwin build --release --target x86_64-pc-windows-msvc --bundles nsis
        env:
          CARGO_INCREMENTAL: 0

      - name: Build Windows ARM64
        env:
          CARGO_TARGET_AARCH64_PC_WINDOWS_MSVC_LINKER: clang-cl
        run: |
          cd src-tauri
          cargo xwin build --release --target aarch64-pc-windows-msvc --bundles nsis
        env:
          CARGO_INCREMENTAL: 0

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mem-switch-nightly-${{ env.DATE }}-windows
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis/*.exe
          retention-days: 3
          compression-level: 8

  # ============================================
  # macOS Nightly Build
  # ============================================
  build-macos:
    needs: date
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: macos-cargo-registry-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: macos-cargo-index-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: src-tauri/target
          key: macos-cargo-build-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            macos-cargo-build-

      - name: Build macOS x86_64
        run: |
          cd src-tauri
          cargo tauri build --target x86_64-apple-darwin
        env:
          CARGO_INCREMENTAL: 0

      - name: Build macOS ARM64
        run: |
          cd src-tauri
          cargo tauri build --target aarch64-apple-darwin
        env:
          CARGO_INCREMENTAL: 0

      - name: Create Universal Binary
        run: |
          cd src-tauri
          mkdir -p target/universal/release
          lipo -create \
            target/x86_64-apple-darwin/release/mem-switch-desktop \
            target/aarch64-apple-darwin/release/mem-switch-desktop \
            -output target/universal/release/mem-switch-desktop

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mem-switch-nightly-${{ env.DATE }}-macos
          path: |
            src-tauri/target/x86_64-apple-darwin/release/bundle/**/*
            src-tauri/target/aarch64-apple-darwin/release/bundle/**/*
            src-tauri/target/universal/release/mem-switch-desktop
          retention-days: 3
          compression-level: 8

  # ============================================
  # Frontend Nightly Build
  # ============================================
  build-frontend:
    needs: date
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Upload frontend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mem-switch-nightly-${{ env.DATE }}-frontend
          path: frontend/dist
          retention-days: 3
          compression-level: 8

  # ============================================
  # Generate Nightly Release
  # ============================================
  release:
    needs: [date, build-linux, build-windows, build-macos, build-frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f ! -name "SHA256SUMS.txt" -exec sha256sum {} \; > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Delete old artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const artifacts = fs.readdirSync('.');
            for (const art of artifacts) {
              if (art.startsWith('mem-switch-nightly-')) {
                fs.rmSync(art, { recursive: true, force: true });
              }
            }

      - name: Create Nightly Release
        uses: softprops/action-gh-release@v2
        with:
          tag: nightly-${{ env.DATE }}
          name: Nightly Build ${{ env.DATE }}
          draft: false
          prerelease: true
          generate_release_notes: true
          files: |
            artifacts/**/*
            artifacts/SHA256SUMS.txt

      - name: Cleanup old nightly releases
        uses: actions/github-script@v7
        with:
          script: |
            const { github, context } = require('@actions/github');
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            const nightlyReleases = releases.data.filter(r => r.tag_name.startsWith('nightly-'));
            // Keep last 7 nightly releases
            for (let i = 7; i < nightlyReleases.length; i++) {
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: nightlyReleases[i].id
              });
            }