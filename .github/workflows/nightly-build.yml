name: Nightly Build

on:
  workflow_dispatch:
  schedule:
    # Run at 01:00 AM Beijing time (17:00 UTC)
    - cron: '0 17 * * *'

permissions:
  contents: write
  actions: write

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
          - os: ubuntu-22.04-arm
            arch: arm64
          - os: macos-14
          - os: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets
        if: runner.os == 'macOS'
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            curl \
            wget \
            file \
            patchelf \
            libssl-dev \
            rpm \
            flatpak \
            flatpak-builder \
            elfutils \
            xdg-utils \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libglib2.0-dev
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
          sudo apt-get install -y --no-install-recommends libsoup-3.0-dev \
            || sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - name: Install frontend deps
        run: |
          cd frontend
          npm ci

      - name: Build Tauri
        run: |
          cd src-tauri
          cargo tauri build

      - name: Set date output
        id: date
        run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Collect build artifacts
        shell: bash
        run: |
          mkdir -p release-assets
          if [ "${{ runner.os }}" = "macOS" ]; then
            cp -r src-tauri/target/release/bundle/dmg/*.app release-assets/ 2>/dev/null || true
            cp src-tauri/target/release/mem-switch-desktop release-assets/ 2>/dev/null || true
          else
            cp src-tauri/target/release/bundle/appimage/*.AppImage release-assets/ 2>/dev/null || true
            cp src-tauri/target/release/bundle/deb/*.deb release-assets/ 2>/dev/null || true
            cp src-tauri/target/release/bundle/rpm/*.rpm release-assets/ 2>/dev/null || true
          fi
          ls -la release-assets/

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-${{ runner.os }}-${{ matrix.arch || runner.arch }}-${{ steps.date.outputs.date }}
          path: release-assets/*
          retention-days: 3

  publish-release:
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          pattern: release-assets-*
          merge-multiple: true

      - name: Set date output
        id: date
        run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f ! -name "SHA256SUMS.txt" -exec sha256sum {} \; > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create Nightly Release
        env:
          DATE: ${{ steps.date.outputs.date }}
        run: |
          gh release create "nightly-$DATE" \
            --title "Nightly Build $DATE" \
            --draft false \
            --prerelease \
            --notes "Nightly build from $DATE" \
            artifacts/**/* \
            artifacts/SHA256SUMS.txt