name: Nightly Build

on:
  workflow_dispatch:
  schedule:
    # Run at 01:00 AM Beijing time (17:00 UTC)
    - cron: '0 17 * * *'

permissions:
  contents: write
  actions: write

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Add macOS targets
        if: runner.os == 'macOS'
        run: |
          rustup target add ${{ matrix.target }}

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            curl \
            wget \
            file \
            patchelf \
            libssl-dev \
            rpm \
            flatpak \
            flatpak-builder \
            elfutils \
            xdg-utils \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libglib2.0-dev
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install pyinstaller uvicorn fastapi
          pip install -r backend/requirements.txt

      - name: Build Python backend (Windows)
        if: runner.os == 'Windows'
        env:
          TAURI_SIDECAR_TARGET: ${{ matrix.target }}
        run: |
          cd backend
          if exist mem-switch-backend.spec del mem-switch-backend.spec
          pyinstaller --clean --onefile --name mem-switch-backend --hidden-import uvicorn.logging --hidden-import uvicorn.loops.auto --hidden-import uvicorn.protocols.http.auto --hidden-import uvicorn.protocols.websocket.auto cli.py

      - name: Build Python backend (Unix)
        if: runner.os != 'Windows'
        env:
          TAURI_SIDECAR_TARGET: ${{ matrix.target }}
        run: |
          cd backend
          rm -f mem-switch-backend.spec
          pyinstaller --clean --onefile --name mem-switch-backend --hidden-import uvicorn.logging --hidden-import uvicorn.loops.auto --hidden-import uvicorn.protocols.http.auto --hidden-import uvicorn.protocols.websocket.auto cli.py

      - name: Prepare sidecar
        env:
          TAURI_SIDECAR_TARGET: ${{ matrix.target }}
        run: |
          python scripts/prepare-sidecar.py

      - name: Install frontend deps
        run: |
          cd frontend
          npm ci

      - name: Install tauri-cli
        run: |
          cargo install tauri-cli --version "^2.0.0" --locked

      - name: Build Tauri
        run: |
          cd src-tauri
          cargo tauri build --target ${{ matrix.target }}

      - name: Set date output
        id: date
        run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Collect build artifacts
        shell: bash
        run: |
          mkdir -p release-assets
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp src-tauri/target/release/bundle/nsis/*.exe release-assets/ 2>/dev/null || true
          elif [ "${{ runner.os }}" = "macOS" ]; then
            cp src-tauri/target/release/bundle/dmg/*.dmg release-assets/ 2>/dev/null || true
          else
            cp src-tauri/target/release/bundle/appimage/*.AppImage release-assets/ 2>/dev/null || true
            cp src-tauri/target/release/bundle/deb/*.deb release-assets/ 2>/dev/null || true
          fi
          ls -la release-assets/

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.target }}-${{ steps.date.outputs.date }}
          path: release-assets/*
          retention-days: 3

  publish-release:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-assets-*
          merge-multiple: true

      - name: Set date output
        id: date
        run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f ! -name "SHA256SUMS.txt" -exec sha256sum {} \; > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create Nightly Release
        env:
          DATE: ${{ steps.date.outputs.date }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "nightly-$DATE" \
            --title "Nightly Build $DATE" \
            --draft false \
            --prerelease \
            --notes "Nightly build from $DATE" \
            artifacts/**/* \
            artifacts/SHA256SUMS.txt
