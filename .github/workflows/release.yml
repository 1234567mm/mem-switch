name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-2022
          - os: ubuntu-22.04
          - os: ubuntu-22.04-arm
            arch: arm64
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets
        if: runner.os == 'macOS'
        run: |
          rustup target add ${{ matrix.target }}

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            curl \
            wget \
            file \
            patchelf \
            libssl-dev \
            rpm \
            flatpak \
            flatpak-builder \
            elfutils \
            xdg-utils \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libglib2.0-dev
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
          sudo apt-get install -y --no-install-recommends libsoup-3.0-dev \
            || sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - name: Install frontend deps
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Build Tauri
        run: |
          cd src-tauri
          cargo tauri build${{ matrix.target && format(' --target {0}', matrix.target) || '' }}

      - name: Collect build artifacts
        shell: bash
        run: |
          mkdir -p release-assets
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp src-tauri/target/release/bundle/nsis/*.exe release-assets/ 2>/dev/null || true
          elif [ "${{ runner.os }}" = "macOS" ]; then
            cp src-tauri/target/release/bundle/dmg/*.dmg release-assets/ 2>/dev/null || true
          else
            cp src-tauri/target/release/bundle/appimage/*.AppImage release-assets/ 2>/dev/null || true
            cp src-tauri/target/release/bundle/deb/*.deb release-assets/ 2>/dev/null || true
            cp src-tauri/target/release/bundle/rpm/*.rpm release-assets/ 2>/dev/null || true
          fi
          ls -la release-assets/

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ runner.os }}-${{ matrix.target || 'native' }}-${{ matrix.arch || runner.arch }}
          path: release-assets/*
          retention-days: 5

  publish-release:
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-assets-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f ! -name "SHA256SUMS.txt" -exec sha256sum {} \; > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/**/*
            artifacts/SHA256SUMS.txt