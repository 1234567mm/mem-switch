name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Platforms to build (linux,windows,macos)'
        required: true
        default: 'all'

env:
  VERSION: ${{ github.ref_name }}

jobs:
  # ============================================
  # Linux Build (AppImage + deb)
  # ============================================
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libwebkit2gtk-4.0-37 libappindicator3-1

      - name: Build Linux x86_64
        run: |
          cd src-tauri
          cargo tauri build --target x86_64-unknown-linux-gnu --bundles appimage,deb

      - name: Build Linux ARM64
        run: |
          cd src-tauri
          cargo tauri build --target aarch64-unknown-linux-gnu --bundles appimage,deb

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/**/*.AppImage
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/**/*.deb
            src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/**/*.AppImage
            src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/**/*.deb

  # ============================================
  # Windows Build (NSIS + exe) using cross-compilation
  # ============================================
  build-windows:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: x86_64-pc-windows-msvc,aarch64-pc-windows-msvc

      - name: Install cargo-xwin
        run: cargo install cargo-xwin

      - name: Build Windows x86_64
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER: clang-cl
        run: |
          cd src-tauri
          cargo xwin build --release --target x86_64-pc-windows-msvc

      - name: Build Windows ARM64
        env:
          CARGO_TARGET_AARCH64_PC_WINDOWS_MSVC_LINKER: clang-cl
        run: |
          cd src-tauri
          cargo xwin build --release --target aarch64-pc-windows-msvc

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/*.exe
            src-tauri/target/aarch64-pc-windows-msvc/release/*.exe

      # NOTE: NSIS installer requires Windows environment
      # Run on Windows runner for NSIS:
      - name: Build Windows NSIS (Windows only)
        if: false  # Enable when using windows-latest runner
        run: |
          cd src-tauri
          cargo tauri build --target x86_64-pc-windows-msvc --bundles nsis

  # ============================================
  # macOS Build (app + dmg)
  # ============================================
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Build macOS x86_64
        run: |
          cd src-tauri
          cargo tauri build --target x86_64-apple-darwin

      - name: Build macOS ARM64
        run: |
          cd src-tauri
          cargo tauri build --target aarch64-apple-darwin

      - name: Build Universal Binary
        run: |
          # Create universal binary using lipo
          lipo -create \
            src-tauri/target/x86_64-apple-darwin/release/mem-switch-desktop \
            src-tauri/target/aarch64-apple-darwin/release/mem-switch-desktop \
            -output src-tauri/target/universal/mem-switch-desktop
          mkdir -p src-tauri/target/universal/bundle
          cp src-tauri/target/x86_64-apple-darwin/release/bundle/*.app src-tauri/target/universal/bundle/ || true

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: |
            src-tauri/target/x86_64-apple-darwin/release/bundle/**/*
            src-tauri/target/aarch64-apple-darwin/release/bundle/**/*
            src-tauri/target/universal/bundle/**/*

  # ============================================
  # Create Release (all platforms)
  # ============================================
  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/**/*
            artifacts/SHA256SUMS.txt
