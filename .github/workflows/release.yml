name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Platforms to build (all, linux, windows, macos)'
        required: false
        default: 'all'

env:
  VERSION: ${{ github.ref_name }}

jobs:
  # ============================================
  # Linux Build (AppImage + deb)
  # ============================================
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libwebkit2gtk-4.0-37 libappindicator3-1 libevdev-dev libxtst-dev libx11-dev libxfixes-dev

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: linux-cargo-registry-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: linux-cargo-index-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: src-tauri/target
          key: linux-cargo-build-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            linux-cargo-build-

      - name: Build Linux x86_64
        run: |
          cd src-tauri
          cargo tauri build --target x86_64-unknown-linux-gnu --bundles appimage,deb
        env:
          CARGO_INCREMENTAL: 0

      - name: Build Linux ARM64
        run: |
          cd src-tauri
          cargo tauri build --target aarch64-unknown-linux-gnu --bundles appimage,deb
        env:
          CARGO_INCREMENTAL: 0

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/**/*.AppImage
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/**/*.deb
            src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/**/*.AppImage
            src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/**/*.deb
          retention-days: 5

  # ============================================
  # Windows Build (NSIS installer via cargo-xwin)
  # ============================================
  build-windows:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc,aarch64-pc-windows-msvc

      - name: Install cargo-xwin
        run: cargo install cargo-xwin

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: windows-cargo-registry-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: windows-cargo-index-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: src-tauri/target
          key: windows-cargo-build-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            windows-cargo-build-

      - name: Build Windows x86_64
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER: clang-cl
          CARGO_INCREMENTAL: 0
        run: |
          cd src-tauri
          cargo xwin build --release --target x86_64-pc-windows-msvc --bundles nsis

      - name: Build Windows ARM64
        env:
          CARGO_TARGET_AARCH64_PC_WINDOWS_MSVC_LINKER: clang-cl
          CARGO_INCREMENTAL: 0
        run: |
          cd src-tauri
          cargo xwin build --release --target aarch64-pc-windows-msvc --bundles nsis

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis/*.exe
          retention-days: 5

  # ============================================
  # macOS Build (requires macOS runner)
  # ============================================
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: macos-cargo-registry-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: macos-cargo-index-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: src-tauri/target
          key: macos-cargo-build-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            macos-cargo-build-

      - name: Build macOS x86_64
        run: |
          cd src-tauri
          cargo tauri build --target x86_64-apple-darwin
        env:
          CARGO_INCREMENTAL: 0

      - name: Build macOS ARM64
        run: |
          cd src-tauri
          cargo tauri build --target aarch64-apple-darwin
        env:
          CARGO_INCREMENTAL: 0

      - name: Create Universal Binary
        run: |
          cd src-tauri
          mkdir -p target/universal/release
          lipo -create \
            target/x86_64-apple-darwin/release/mem-switch-desktop \
            target/aarch64-apple-darwin/release/mem-switch-desktop \
            -output target/universal/release/mem-switch-desktop

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: |
            src-tauri/target/x86_64-apple-darwin/release/bundle/**/*
            src-tauri/target/aarch64-apple-darwin/release/bundle/**/*
            src-tauri/target/universal/release/mem-switch-desktop
          retention-days: 5

  # ============================================
  # Create Release
  # ============================================
  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f ! -name "SHA256SUMS.txt" -exec sha256sum {} \; > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/**/*
            artifacts/SHA256SUMS.txt