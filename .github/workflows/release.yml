name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  rust-check:
    name: Rust Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        shell: bash
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-features -- -D warnings

  # ── Python sidecar 打包 ─────────────────────────────────
  build-backend:
    name: Build backend (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            sidecar_name: mem-switch-backend-aarch64-apple-darwin

          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            sidecar_name: mem-switch-backend-x86_64-unknown-linux-gnu

          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            sidecar_name: mem-switch-backend-aarch64-unknown-linux-gnu

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar_name: mem-switch-backend-x86_64-pc-windows-msvc

          - os: windows-latest
            target: aarch64-pc-windows-msvc
            sidecar_name: mem-switch-backend-aarch64-pc-windows-msvc

          
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Cache uv packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-packages-${{ runner.os }}-${{ matrix.target }}
          restore-keys: |
            uv-packages-${{ runner.os }}-

      - name: Cache backend binary
        id: cache-backend-binary
        uses: actions/cache@v4
        with:
          path: backend/dist/${{ matrix.sidecar_name }}*
          key: backend-binary-${{ matrix.target }}

      - name: Install dependencies
        working-directory: backend
        run: uv pip install --system pyinstaller -r requirements.txt

      # PyInstaller 打包（cli.py，非 main.py）
      - name: Build sidecar (Unix)
        if: runner.os != 'Windows' && steps.cache-backend-binary.outputs.cache-hit != 'true'
        working-directory: backend
        run: |
          pyinstaller \
            --onefile \
            --clean \
            --name "${{ matrix.sidecar_name }}" \
            --distpath ./dist \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops \
            --hidden-import uvicorn.loops.auto \
            --hidden-import uvicorn.protocols \
            --hidden-import uvicorn.protocols.http \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.lifespan \
            --hidden-import uvicorn.lifespan.on \
            --collect-all chromadb \
            cli.py

      - name: Build sidecar (Windows)
        if: runner.os == 'Windows' && steps.cache-backend-binary.outputs.cache-hit != 'true'
        working-directory: backend
        shell: pwsh
        run: |
          pyinstaller `
            --onefile `
            --clean `
            --name "${{ matrix.sidecar_name }}" `
            --distpath ./dist `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.loops `
            --hidden-import uvicorn.loops.auto `
            --hidden-import uvicorn.protocols `
            --hidden-import uvicorn.protocols.http `
            --hidden-import uvicorn.protocols.http.auto `
            --hidden-import uvicorn.protocols.websockets `
            --hidden-import uvicorn.protocols.websockets.auto `
            --hidden-import uvicorn.lifespan `
            --hidden-import uvicorn.lifespan.on `
            --collect-all chromadb `
            --noconsole `
            cli.py

      # 移动到 Tauri sidecar 目录
      - name: Prepare sidecar
        env:
          TAURI_SIDECAR_TARGET: ${{ matrix.target }}
        run: python scripts/prepare-sidecar.py

      - name: Upload sidecar
        uses: actions/upload-artifact@v4
        with:
          name: backend-sidecar-${{ matrix.target }}
          path: src-tauri/binaries/mem-switch-backend-${{ matrix.target }}*
          retention-days: 1

  # ── Tauri 应用构建 ─────────────────────────────────────
  build:
    name: Build (${{ matrix.artifact_name }})
    needs: [rust-check, build-backend]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            backend_target: aarch64-apple-darwin
            artifact_name: mem-switch-macos-arm64

          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            backend_target: x86_64-unknown-linux-gnu
            artifact_name: mem-switch-linux-amd64

          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            backend_target: aarch64-unknown-linux-gnu
            artifact_name: mem-switch-linux-arm64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            backend_target: x86_64-pc-windows-msvc
            artifact_name: mem-switch-windows-amd64

          - os: windows-latest
            target: aarch64-pc-windows-msvc
            backend_target: aarch64-pc-windows-msvc
            artifact_name: mem-switch-windows-arm64

          
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Compute apt package hash
        id: apt-hash
        shell: bash
        run: |
          HASH_4_1=$(echo 'libglib2.0-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev' | sha256sum | cut -d' ' -f1)
          HASH_4_0=$(echo 'libglib2.0-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev' | sha256sum | cut -d' ' -f1)
          echo "hash=v1-$HASH_4_1-$HASH_4_0" >> $GITHUB_OUTPUT

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-${{ steps.apt-hash.outputs.hash }}
          restore-keys: |
            apt-${{ runner.os }}-

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            || sudo apt-get install -y \
            libglib2.0-dev \
            libwebkit2gtk-4.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install frontend deps
        shell: bash
        run: cd frontend && npm ci

      # 下载对应平台的 sidecar
      - name: Download backend sidecar
        uses: actions/download-artifact@v4
        with:
          name: backend-sidecar-${{ matrix.backend_target }}
          path: src-tauri/binaries/

      - name: Verify sidecar
        shell: bash
        run: ls -la src-tauri/binaries/

      # 安装 tauri-cli（缓存加速）
      - name: Cache tauri-cli
        id: cache-tauri
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/tauri
          key: tauri-cli-${{ runner.os }}-v2

      - name: Install tauri-cli (Linux)
        if: steps.cache-tauri.outputs.cache-hit != 'true' && runner.os == 'Linux'
        run: |
          # cargo-binstall 比 cargo install 快 5-10 倍
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstallCargo/binaries/cargo-binstall-v1.6.0-x86_64-unknown-linux-musl.tar.gz | tar -xz
          ./cargo-binstall -y tauri-cli --version "^2.0.0"

      - name: Install tauri-cli (macOS/Windows)
        if: steps.cache-tauri.outputs.cache-hit != 'true' && runner.os != 'Linux'
        run: cargo install tauri-cli --version "^2.0.0" --locked

      - name: Build Tauri
        shell: bash
        run: cd src-tauri && cargo tauri build --target ${{ matrix.target }}

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p release-assets
          TARGET="src-tauri/target/${{ matrix.target }}/release/bundle"
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "$TARGET/nsis/"*.exe release-assets/ 2>/dev/null || true
          elif [ "${{ runner.os }}" = "macOS" ]; then
            cp "$TARGET/dmg/"*.dmg release-assets/ 2>/dev/null || true
          else
            cp "$TARGET/appimage/"*.AppImage release-assets/ 2>/dev/null || true
            cp "$TARGET/deb/"*.deb release-assets/ 2>/dev/null || true
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release-assets/*
          retention-days: 5

  # ── 发布 ───────────────────────────────────────────────
  publish:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: mem-switch-*
          merge-multiple: true

      - name: Extract changelog for this version
        env:
          TAG_VERSION: ${{ github.ref_name }}
        run: |
          # Extract changelog section for this version (from [Unreleased] to next version or ---)
          # Works with both v0.1.0 and 0.1.0 format
          VERSION_NUM="${TAG_VERSION#v}"
          awk -v ver="$VERSION_NUM" '
            BEGIN { in_section=0 }
            /^\[Unreleased\]/ { next }
            /^\[.*\]/ {
              if (match($0, ver)) {
                in_section=1
              } else {
                in_section=0
              }
            }
            in_section && /^## / { exit }
            in_section { print }
          ' CHANGELOG.md > release-notes.md
          cat release-notes.md

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Generate platform installation instructions
        run: |
          cat > platform-instructions.md << 'EOF'
          ## 安装说明 / Installation

          下载对应平台的安装包：

          | 平台 | 文件 | 校验码 |
          |------|------|--------|
          | macOS AMD64 (Intel) | `mem-switch-macos-amd64.dmg` | SHA256 (见 checksums.txt) |
          | macOS ARM64 (Apple Silicon) | `mem-switch-macos-arm64.dmg` | SHA256 (见 checksums.txt) |
          | Linux AMD64 | `mem-switch-linux-amd64.AppImage`, `.deb` | SHA256 (见 checksums.txt) |
          | Linux ARM64 | `mem-switch-linux-arm64.AppImage`, `.deb` | SHA256 (见 checksums.txt) |
          | Windows AMD64 | `mem-switch-windows-amd64.exe` (NSIS installer) | SHA256 (见 checksums.txt) |
          | Windows ARM64 | `mem-switch-windows-arm64.exe` (NSIS installer) | SHA256 (见 checksums.txt) |

          ### macOS
          1. 下载 `.dmg` 文件
          2. 挂载镜像并拖动应用到 Applications
          3. 首次运行需在 System Preferences > Security 允许运行

          ### Linux
          - **AppImage**: `chmod +x *.AppImage && ./*.AppImage`
          - **DEB**: `sudo dpkg -i *.deb`

          ### Windows
          运行 `.exe` 安装包，按向导完成安装。

          EOF
          cat platform-instructions.md

      - name: Combine release notes
        run: |
          cat release-notes.md platform-instructions.md > full-release-notes.md
          cat full-release-notes.md

      - name: Generate update manifests
        env:
          TAG_VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_VERSION#v}"
          MAJOR_MINOR="${VERSION%.*}"

          cat > latest.yml << 'YML_EOF'
          version: $VERSION
          major_minor: $MAJOR_MINOR
          platforms:
            darwin-amd64:
              filename: mem-switch-macos-amd64.dmg
            darwin-arm64:
              filename: mem-switch-macos-arm64.dmg
            linux-amd64:
              filename: mem-switch-linux-amd64.AppImage
            linux-arm64:
              filename: mem-switch-linux-arm64.AppImage
            windows-amd64:
              filename: mem-switch-windows-amd64.exe
            windows-arm64:
              filename: mem-switch-windows-arm64.exe
          YML_EOF

          cat > latest-linux.yml << 'YML_EOF'
          version: $VERSION
          major_minor: $MAJOR_MINOR
          platforms:
            linux-amd64:
              filename: mem-switch-linux-amd64.AppImage
            linux-arm64:
              filename: mem-switch-linux-arm64.AppImage
          YML_EOF

          cat > latest-mac.yml << 'YML_EOF'
          version: $VERSION
          major_minor: $MAJOR_MINOR
          platforms:
            darwin-amd64:
              filename: mem-switch-macos-amd64.dmg
            darwin-arm64:
              filename: mem-switch-macos-arm64.dmg
          YML_EOF

          cat > latest-windows.yml << 'YML_EOF'
          version: $VERSION
          major_minor: $MAJOR_MINOR
          platforms:
            windows-amd64:
              filename: mem-switch-windows-amd64.exe
            windows-arm64:
              filename: mem-switch-windows-arm64.exe
          YML_EOF

          cat > latest-linux-arm64.yml << 'YML_EOF'
          version: $VERSION
          major_minor: $MAJOR_MINOR
          platforms:
            linux-arm64:
              filename: mem-switch-linux-arm64.AppImage
          YML_EOF

          cat > latest-arm64.yml << 'YML_EOF'
          version: $VERSION
          major_minor: $MAJOR_MINOR
          platforms:
            darwin-arm64:
              filename: mem-switch-macos-arm64.dmg
            linux-arm64:
              filename: mem-switch-linux-arm64.AppImage
            windows-arm64:
              filename: mem-switch-windows-arm64.exe
          YML_EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          body_path: full-release-notes.md
          files: |
            artifacts/*
            latest.yml
            latest-linux.yml
            latest-mac.yml
            latest-windows.yml
            latest-linux-arm64.yml
            latest-arm64.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}